name: App Checks

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run taxonomy unit tests (no DB required)
        run: python -m pytest tests/test_db_connection.py::test_taxonomy_module tests/test_db_connection.py::test_hashing_utility tests/test_db_connection.py::test_date_normalization -v
